---
# =============================================================================
# Handlers — Rôle security
# =============================================================================

- name: restart ssh
  ansible.builtin.service:
    name: ssh
    state: restarted
  listen: restart ssh

- name: restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  listen: restart fail2ban

- name: reload ufw
  community.general.ufw:
    state: enabled
  listen: reload ufw
