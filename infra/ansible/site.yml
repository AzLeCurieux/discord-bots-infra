---
# Usage:
#   First run (port 22, before hardening):
#     ansible-playbook -i inventory.ini site.yml --ask-vault-pass \
#       -e "ansible_user=deploy ansible_port=22"
#
#   Subsequent runs (port 2222):
#     ansible-playbook -i inventory.ini site.yml --ask-vault-pass

- name: "Phase 1 - Base system configuration"
  hosts: discord_bots
  become: true
  gather_facts: true
  tags:
    - setup
    - common

  pre_tasks:
    - name: Verify server connectivity
      ansible.builtin.ping:
      tags: always

    - name: Print system information
      ansible.builtin.debug:
        msg: >
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          | Kernel: {{ ansible_kernel }}
          | vCPU: {{ ansible_processor_vcpus }}
          | RAM: {{ ansible_memtotal_mb }} MB
      tags: always

  roles:
    - role: common
      tags: common

- name: "Phase 2 - Security hardening"
  hosts: discord_bots
  become: true
  gather_facts: false
  tags:
    - setup
    - security

  roles:
    - role: security
      tags: security

- name: "Phase 3 - Docker installation"
  hosts: discord_bots
  become: true
  gather_facts: false
  tags:
    - setup
    - docker

  roles:
    - role: docker
      tags: docker

- name: "Phase 4 - Deploy Discord bots"
  hosts: discord_bots
  become: true
  become_user: "{{ bot_user }}"
  gather_facts: false
  tags:
    - deploy
    - bots

  vars_files:
    - group_vars/all/vars.yml
    - group_vars/all/vault.yml

  roles:
    - role: bots
      tags: bots

- name: "Phase 5 - Monitoring stack"
  hosts: discord_bots
  become: true
  gather_facts: false
  tags:
    - monitoring

  vars_files:
    - group_vars/all/vars.yml
    - group_vars/all/vault.yml

  roles:
    - role: monitoring
      tags: monitoring
