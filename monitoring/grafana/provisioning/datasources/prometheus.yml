# =============================================================================
# Grafana — Auto-provisioning de la datasource Prometheus
# Ce fichier est chargé automatiquement au démarrage de Grafana
# =============================================================================

apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    basicAuth: false
    isDefault: true
    version: 1
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      queryTimeout: "60s"
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: ""
